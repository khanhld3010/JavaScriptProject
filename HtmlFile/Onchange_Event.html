<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TestOnChangeEvent</title>
</head>
<body>
    <p>Select a new car from the list</p>
    <label>
        <select id="selectedValue">
            <option value="volvo">Volvo</option>
            <option value="saab">Saab</option>
            <option value="opel">Opel</option>
            <option value="audi">Audi</option>
        </select>
    </label>

    <script>
        // function do_something() {
        //     var selectedValue = document.getElementById("selectedValue").value;
        //     alert(selectedValue);
        // }

        var selectedElement = document.getElementById("selectedValue");
        selectedElement.addEventListener("change", changeSelect);
        function changeSelect() {
            var selectedElementValue = document.getElementById("selectedValue").value;
            alert("Bạn đã chọn " +selectedElementValue);
        }
    </script>
</body>
</html>
